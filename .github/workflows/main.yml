name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Deploy to S3
      run: |
        aws s3 sync . s3://your-bucket-name --delete --exclude ".git/*"
        aws s3 cp s3://your-bucket-name/ s3://your-bucket-name/ --recursive --acl public-read

    - name: Output S3 Website URL
      run: echo "Deployment successful! Visit: http://your-bucket-name.s3-website-us-east-1.amazonaws.com"
